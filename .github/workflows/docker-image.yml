name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build -t md2html . 

  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run the Docker image
        run: docker run --rm -v "$PWD":/work md2html -in /work/README.md -out /work/README.html
